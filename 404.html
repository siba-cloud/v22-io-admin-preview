<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Vault22 — Investment Operations Admin</title>
    <!--
      Single Page Apps for GitHub Pages (rafgraph/spa-github-pages, MIT).
      GitHub Pages serves this file for any URL it can't match to a real
      file. The script below encodes the requested path into a query string
      and redirects to /index.html so React Router can pick up the route
      after the SPA bundle loads.
      pathSegmentsToKeep = 1 → repo name (`v22-io-admin-preview`) is one
      URL segment.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Loading Vault22 IO Admin canvas…</p>
  </body>
</html>
